name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: estalo-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: estalo-backend/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # tests/ roda inteira em SQLite em memória (StaticPool, ver
      # tests/conftest.py) e mocka toda chamada ao Gemini (unittest.mock em
      # httpx.post) -- não precisa de GEMINI_API_KEY nem de banco real, por
      # isso nenhum secret é necessário aqui. pytest.ini já restringe a
      # coleta a tests/ (testpaths), então os scripts test_*.py na raiz
      # (que batem no estalo.db local de verdade) não entram nessa rodada.
      - name: Rodar suíte de testes
        run: pytest -v
