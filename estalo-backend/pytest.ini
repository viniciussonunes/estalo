[pytest]
# Só coleta dentro de tests/ -- os scripts test_*.py na raiz do projeto
# (test_auth.py, test_study.py, etc.) são scripts print+assert que rodam
# contra o estalo.db local de VERDADE (não pytest, não isolados); se o
# pytest tentasse coletá-los, importaria e executaria todo o código de
# nível de módulo deles como efeito colateral da coleta, atropelando o
# banco de dev. testpaths restringe a busca só a tests/.
testpaths = tests

# smoke_tests.py (nome pedido explicitamente, não bate com o padrão
# padrão test_*.py/*_test.py) precisa entrar aqui pra ser descoberto.
python_files = test_*.py *_tests.py smoke_tests.py
